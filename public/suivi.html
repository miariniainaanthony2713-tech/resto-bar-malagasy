<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi de commande — Resto Bar Malagasy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="suivi.css">
</head>
<body data-page="">
<script src="components.js"></script>

<section class="suivi_section">
    <h4 class="mini_title">Suivi</h4>
    <h2 class="title">SUIVRE MA COMMANDE</h2>

    <div class="suivi_form">
        <input type="text" id="order_number_input" placeholder="Ex : #0042" maxlength="6">
        <button id="search_btn">Rechercher</button>
    </div>
    <p id="suivi_error" class="suivi_error"></p>

    <div id="suivi_result" class="suivi_result" style="display:none">
        <div class="suivi_card">
            <div class="suivi_header">
                <div>
                    <p class="suivi_order_num" id="res_num"></p>
                    <p class="suivi_customer" id="res_customer"></p>
                </div>
                <div class="suivi_status_badge" id="res_status_badge"></div>
            </div>
            <div class="suivi_timeline" id="suivi_timeline"></div>
            <div class="suivi_items">
                <p class="suivi_items_title">Articles commandés</p>
                <div id="res_items"></div>
                <div class="suivi_total_row">
                    <span>Total</span>
                    <span id="res_total"></span>
                </div>
            </div>
        </div>
    </div>
</section>

<footer>
  <div class="services_list">
    <div class="service"><img src="img12.jpg" alt=""><h2>Ouverture</h2><p>07h30 à 22h45</p><p>Tous les jours</p></div>
    <div class="service"><img src="img13.png" alt=""><h2>Adresse</h2><p>Antananarivo</p><p>Madagascar</p></div>
    <div class="service"><img src="img14.jpg" alt=""><h2>Contact</h2><p>restobarmalagasy@gmail.com</p><p>034 XX XX XX</p></div>
    <hr>
  </div>
  <p class="footer_text">Réalisé par <span>RAKOTONDRASOA Miariniaina Anthony Naivoson</span> | Tous les droits sont réservés.</p>
</footer>

<script src="/socket.io/socket.io.js"></script>
<script src="common.js"></script>
<script>
var socket = io();
var currentOrderId = null;

var STATUSES = [
  { key: 'nouvelle',       label: 'Commande reçue',      icon: '📋' },
  { key: 'en_preparation', label: 'En préparation',       icon: '👨‍🍳' },
  { key: 'prete',          label: 'Prête à servir',       icon: '✅' },
  { key: 'servie',         label: 'Servie',               icon: '🍽️' }
];

var STATUS_LABELS = {
  nouvelle:       { label: 'Reçue',          color: '#FF6B00' },
  en_preparation: { label: 'En préparation', color: '#f1c40f' },
  prete:          { label: 'Prête !',        color: '#27ae60' },
  servie:         { label: 'Servie',         color: '#999' }
};

function renderResult(order) {
  currentOrderId = order.id;
  var statusInfo = STATUS_LABELS[order.status] || STATUS_LABELS.nouvelle;

  document.getElementById('res_num').textContent = 'Commande #' + order.orderNumber;
  document.getElementById('res_customer').textContent = 'Client : ' + order.customerName + ' · Table ' + order.tableNumber;

  var badge = document.getElementById('res_status_badge');
  badge.textContent = statusInfo.label;
  badge.style.backgroundColor = statusInfo.color;

  // Timeline
  var timeline = document.getElementById('suivi_timeline');
  timeline.innerHTML = '';
  var currentIndex = STATUSES.findIndex(function(s){ return s.key === order.status; });
  STATUSES.forEach(function(s, i){
    var step = document.createElement('div');
    step.className = 'timeline_step' + (i <= currentIndex ? ' done' : '') + (i === currentIndex ? ' current' : '');
    step.innerHTML = '<div class="timeline_icon">' + s.icon + '</div><p>' + s.label + '</p>';
    timeline.appendChild(step);
  });

  // Articles
  var itemsEl = document.getElementById('res_items');
  itemsEl.innerHTML = '';
  order.items.forEach(function(item){
    var row = document.createElement('div');
    row.className = 'suivi_item_row';
    row.innerHTML = '<span>' + item.quantity + ' × ' + item.name + '</span><span>' + (item.price * item.quantity).toLocaleString('fr-FR') + ' Ar</span>';
    itemsEl.appendChild(row);
  });

  document.getElementById('res_total').textContent = order.total.toLocaleString('fr-FR') + ' Ar';
  document.getElementById('suivi_result').style.display = 'block';
}

document.getElementById('search_btn').onclick = function(){
  var input = document.getElementById('order_number_input').value.trim().replace('#','');
  var errorEl = document.getElementById('suivi_error');
  errorEl.textContent = '';
  document.getElementById('suivi_result').style.display = 'none';

  if (!input){ errorEl.textContent = 'Veuillez entrer un numéro de commande.'; return; }

  fetch('/api/track/' + input)
    .then(function(r){ if(!r.ok) throw new Error(); return r.json(); })
    .then(function(order){ renderResult(order); })
    .catch(function(){ errorEl.textContent = 'Commande introuvable. Vérifiez le numéro.'; });
};

document.getElementById('order_number_input').addEventListener('keydown', function(e){
  if(e.key === 'Enter') document.getElementById('search_btn').click();
});

// Mise à jour en temps réel
socket.on('order-updated', function(order){
  if (order.id === currentOrderId) renderResult(order);
});
</script>
</body>
</html>
